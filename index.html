<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>AI Resume & Cover Letter Pack</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-gray-100 flex items-center justify-center min-h-screen"><div class="bg-white p-8 rounded-lg shadow-md max-w-md w-full text-center"><h1 class="text-3xl font-bold mb-4">AI Resume & Cover Letter Pack</h1><p class="text-gray-700 mb-6">Land your dream job with AI-optimized templates.</p><p class="text-2xl font-semibold text-indigo-600 mb-6">$9.99</p><button id="checkout-button" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-md transition duration-300">Get the Pack Now</button><p class="text-sm text-gray-500 mt-4">Instant Download</p></div><script src="https://js.stripe.com/v3/"></script><script>
  const stripe = Stripe('YOUR_STRIPE_PUBLIC_KEY');
  const checkoutButton = document.getElementById('checkout-button');

  checkoutButton.addEventListener('click', async () => {
    try {
      const response = await fetch('/create-checkout-session', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ priceId: 'PRICE_ID_FROM_STRIPE' }), 
      });
      const session = await response.json();

      const result = await stripe.redirectToCheckout({
        sessionId: session.id,
      });

      if (result.error) {
        alert(result.error.message);
      }
    } catch (error) {
      console.error('Error:', error);
    }
  });
</script></body></html>
